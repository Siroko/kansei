<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example WebGPU Post-Processing</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <script type="module">
    import { Renderer } from '../src/renderers/Renderer'
    import { Material } from '../src/materials/Material'
    import { BoxGeometry } from '../src/geometries/BoxGeometry'
    import { Renderable } from '../src/objects/Renderable'
    import { Scene } from '../src/objects/Scene'
    import { Camera } from '../src/cameras/Camera'
    import { Vector2 } from '../src/math/Vector2'
    import { CameraControls } from '../src/controls/CameraControls'
    import { PostProcessingVolume } from '../src/postprocessing/PostProcessingVolume'
    import { SSAOEffect } from '../src/postprocessing/effects/SSAOEffect'
    import { DepthOfFieldEffect } from '../src/postprocessing/effects/DepthOfFieldEffect'
    import { GodRaysEffect } from '../src/postprocessing/effects/GodRaysEffect'

    // ── Scene parameters ──────────────────────────────────────────────────────
    const GRID_SIZE      = 100;   // cubes per side (total = GRID_SIZE²)
    const GRID_SPACING   = 1;   // world-space gap between cube centres
    const NOISE_ZOOM     = 0.08;  // noise frequency — lower = broader hills
    const SCALE_Y_STRENGTH = 60;   // max Y scale applied to each cube

    // ── Lambert shader (white base colour, single directional/point light) ───
    // Light sits top-right of the scene: high Y, positive X, slightly back.
    // Group 0 is intentionally empty — light data is baked as a WGSL constant.
    const lambertShader = /* wgsl */`
      // World-space light position (top-right of the scene).
      const LIGHT_POS : vec3f = vec3f(80.0, 150.0, -60.0);
      const AMBIENT   : f32   = 0.12;
      const BASE_COLOR: vec3f = vec3f(1.0, 1.0, 1.0);

      struct VertexOut {
        @builtin(position) position   : vec4f,
        @location(0)       worldPos   : vec3f,
        @location(1)       worldNormal: vec3f,
      }

      // Group 0 — no material bindings for this shader
      @group(1) @binding(0) var<uniform> normalMatrix     : mat4x4f;
      @group(1) @binding(1) var<uniform> worldMatrix      : mat4x4f;
      @group(2) @binding(0) var<uniform> viewMatrix       : mat4x4f;
      @group(2) @binding(1) var<uniform> projectionMatrix : mat4x4f;

      @vertex
      fn vertex_main(
        @location(0) position : vec4f,
        @location(1) normal   : vec3f,
        @location(2) uv       : vec2f,
      ) -> VertexOut {
        let worldPos = worldMatrix * position;
        var out : VertexOut;
        out.position    = projectionMatrix * viewMatrix * worldPos;
        out.worldPos    = worldPos.xyz;
        // normalMatrix is the inverse-transpose model matrix — correct for
        // non-uniform scales (e.g. the tall, thin noise columns).
        out.worldNormal = normalize((normalMatrix * vec4f(normal, 0.0)).xyz);
        return out;
      }

      @fragment
      fn fragment_main(frag : VertexOut) -> @location(0) vec4f {
        let L        = normalize(LIGHT_POS - frag.worldPos);
        let diffuse  = max(dot(frag.worldNormal, L), 0.0);
        let lighting = AMBIENT + (1.0 - AMBIENT) * diffuse;
        return vec4f(BASE_COLOR * lighting, 1.0);
      }
    `;

    // ── Smooth value noise (2-D, 4 octaves) ───────────────────────────────────
    function hash2(xi, yi) {
      const n = Math.sin(xi * 127.1 + yi * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function valueNoise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix,       fy = y - iy;
      const ux = fx * fx * (3 - 2 * fx); // smoothstep
      const uy = fy * fy * (3 - 2 * fy);
      const a = hash2(ix,   iy  ), b = hash2(ix+1, iy  );
      const c = hash2(ix,   iy+1), d = hash2(ix+1, iy+1);
      return a + (b-a)*ux + (c-a)*uy + ((d-c)-(b-a))*ux*uy;
    }

    function fbm(x, y, octaves = 4) {
      let v = 0, amp = 0.5, freq = 1, norm = 0;
      for (let i = 0; i < octaves; i++) {
        v    += valueNoise(x * freq, y * freq) * amp;
        norm += amp;
        amp  *= 0.5;
        freq *= 2.0;
      }
      return v / norm; // normalised [0, 1]
    }

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new Renderer({
      width: window.innerWidth,
      height: window.innerHeight,
      devicePixelRatio: 1,
      antialias: true,
      sampleCount: 1
    });
    await renderer.initialize();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.canvas);

    // ── Camera & controls ─────────────────────────────────────────────────────
    const scene  = new Scene();
    const camera = new Camera(20, 0.1, 1000, window.innerWidth / window.innerHeight);
    const orbitRadius = window.innerWidth < 768 ? 120 : 90;
    const cameraControls = new CameraControls(camera, scene.position, null, orbitRadius);

    // ── Material (no texture — Lambert only) ──────────────────────────────────
    const material = new Material(lambertShader, { bindings: [] });
    const geometry = new BoxGeometry(1, 1, 1);

    // ── Grid of cubes — position and scaleY set once, never changed ───────────
    const half = (GRID_SIZE - 1) * GRID_SPACING * 0.5; // centre grid at 0,0

    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const worldX = col * GRID_SPACING - half;
        const worldZ = row * GRID_SPACING - half;

        // Perlin-like FBM noise keyed to world position
        const noiseVal = fbm(worldX * NOISE_ZOOM, worldZ * NOISE_ZOOM);
        const scaleY   = noiseVal * SCALE_Y_STRENGTH + 0.1;

        const renderable = new Renderable(geometry, material);
        renderable.position.x = worldX;
        renderable.position.y = 0;
        renderable.position.z = worldZ;
        renderable.scale.y    = scaleY;
        scene.add(renderable);
      }
    }

    // ── Post-processing volume ────────────────────────────────────────────────
    const volume = new PostProcessingVolume(renderer, [
      new SSAOEffect({
        radius: 0.8,
        bias: 0.02,
        kernelSize: 16,
        strength: 0.5
      }),
      new GodRaysEffect({
        lightScreenPos: new Vector2(0.5, 0.08),
        density: 0.95,
        weight: 0.008,
        decay: 0.97,
        exposure: 0.8,
        numSamples: 80
      }),
      new DepthOfFieldEffect({
        focusDistance: 25,
        focusRange: 15,
        maxBlur: 8
      }),
    ]);

    // ── Render loop ───────────────────────────────────────────────────────────
    function animate() {
      cameraControls.update();
      volume.render(scene, camera);
      requestAnimationFrame(animate);
    }
    animate();
  </script>
</body>

</html>
