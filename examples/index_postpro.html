<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Example WebGPU Post-Processing</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <script type="module">
    import { Renderer } from '../src/renderers/Renderer'
    import { Material } from '../src/materials/Material'
    import { BoxGeometry } from '../src/geometries/BoxGeometry'
    import { SphereGeometry } from '../src/geometries/SphereGeometry'
    import { Renderable } from '../src/objects/Renderable'
    import { Scene } from '../src/objects/Scene'
    import { Camera } from '../src/cameras/Camera'
    import { Vector2 } from '../src/math/Vector2'
    import { Vector3 } from '../src/math/Vector3'
    import { CameraControls } from '../src/controls/CameraControls'
    import { PostProcessingVolume } from '../src/postprocessing/PostProcessingVolume'
    import { SSAOEffect } from '../src/postprocessing/effects/SSAOEffect'
    import { DepthOfFieldEffect } from '../src/postprocessing/effects/DepthOfFieldEffect'
    import { GodRaysEffect } from '../src/postprocessing/effects/GodRaysEffect'
    import { ShadowMap } from '../src/shadows/ShadowMap'
    import { CubeMapShadowMap } from '../src/shadows/CubeMapShadowMap'
    import { FroxelGrid } from '../src/froxels/FroxelGrid'
    import { VolumetricFogEffect } from '../src/postprocessing/effects/VolumetricFogEffect'
    import { BloomEffect } from '../src/postprocessing/effects/BloomEffect'
    import { ColorGradingEffect } from '../src/postprocessing/effects/ColorGradingEffect'
    import { PathTracerEffect } from '../src/pathtracer/PathTracerEffect'
    import { PathTracerMaterial } from '../src/pathtracer/PathTracerMaterial'
    import { DirectionalLight } from '../src/lights/DirectionalLight'
    import { PointLight } from '../src/lights/PointLight'
    import { Float } from '../src/math/Float'
    import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4/dist/tweakpane.min.js'

    // ── Scene parameters ──────────────────────────────────────────────────────
    const GRID_SIZE      = 60;   // cubes per side (total = GRID_SIZE²)
    const GRID_SPACING   = 1;   // world-space gap between cube centres
    const NOISE_ZOOM     = 0.07;  // noise frequency — lower = broader hills
    const SCALE_Y_STRENGTH = 0;   // max Y scale applied to each cube
    const SCROLL_SPEED   = 15;   // world-units per second along Z

    // ── Scene lights ──────────────────────────────────────────────────────
    const dirLight = new DirectionalLight([0.5, -0.2, 0.5], [1.0, 0.95, 0.85], 1.0);
    dirLight.volumetric = true;

    // ── Lambert shader (white base colour, single directional light) ──────
    // Uses the same lightDir as the volumetric fog so shading is consistent.
    // Group 0 binding 0 = light direction uniform (updated at runtime via Tweakpane).
    const lightDirUniform = new Vector3(dirLight.direction[0], dirLight.direction[1], dirLight.direction[2]);
    const emissiveColor = new Vector3(1.0, 1.0, 1.0);
    const emissiveIntensity = new Float(2.0);

    // ── Shared vertex block (used by both shaders) ──────────────────────────
    const vertexBlock = /* wgsl */`
      const AMBIENT   : f32   = 0.12;
      const BASE_COLOR: vec3f = vec3f(1.0, 1.0, 1.0);

      struct VertexOut {
        @builtin(position) position   : vec4f,
        @location(0)       worldPos   : vec3f,
        @location(1)       worldNormal: vec3f,
      }

      @group(0) @binding(0) var<uniform> lightDirection    : vec3f;
      @group(1) @binding(0) var<uniform> normalMatrix      : mat4x4f;
      @group(1) @binding(1) var<uniform> worldMatrix       : mat4x4f;
      @group(2) @binding(0) var<uniform> viewMatrix        : mat4x4f;
      @group(2) @binding(1) var<uniform> projectionMatrix  : mat4x4f;

      @vertex
      fn vertex_main(
        @location(0) position : vec4f,
        @location(1) normal   : vec3f,
        @location(2) uv       : vec2f,
      ) -> VertexOut {
        let worldPos = worldMatrix * position;
        var out : VertexOut;
        out.position    = projectionMatrix * viewMatrix * worldPos;
        out.worldPos    = worldPos.xyz;
        out.worldNormal = normalize((normalMatrix * vec4f(normal, 0.0)).xyz);
        return out;
      }
    `;

    // ── Non-emissive shader (outputs black at @location(1) so depth-tested
    //    fragments properly clear occluded emissive data) ─────────────────
    const lambertShader = vertexBlock + /* wgsl */`
      #include <shadows>

      struct FragmentOutput {
        @location(0) color    : vec4f,
        @location(1) emissive : vec4f,
        @location(2) normal   : vec4f,
        @location(3) albedo   : vec4f,
      }

      @fragment
      fn fragment_main(frag : VertexOut) -> FragmentOutput {
        let shadow   = calcDirectionalShadow(frag.worldPos, frag.worldNormal);
        let L        = -normalize(lightDirection);
        let diffuse  = max(dot(frag.worldNormal, L), 0.0);
        let lighting = AMBIENT + (1.0 - AMBIENT) * diffuse * shadow;
        return FragmentOutput(
          vec4f(BASE_COLOR * lighting, 1.0),
          vec4f(0, 0, 0, 1),
          vec4f(frag.worldNormal * 0.5 + 0.5, 1.0),
          vec4f(BASE_COLOR, 0.0)
        );
      }
    `;

    // ── Emissive shader (dual MRT output) ───────────────────────────────────
    const emissiveLambertShader = vertexBlock + /* wgsl */`
      #include <shadows>

      @group(0) @binding(1) var<uniform> emissiveColor     : vec3f;
      @group(0) @binding(2) var<uniform> emissiveIntensity : f32;

      struct FragmentOutput {
        @location(0) color    : vec4f,
        @location(1) emissive : vec4f,
        @location(2) normal   : vec4f,
        @location(3) albedo   : vec4f,
      }

      @fragment
      fn fragment_main(frag : VertexOut) -> FragmentOutput {
        let shadow   = calcDirectionalShadow(frag.worldPos, frag.worldNormal);
        let L        = -normalize(lightDirection);
        let diffuse  = max(dot(frag.worldNormal, L), 0.0);
        let lighting = AMBIENT + (1.0 - AMBIENT) * diffuse * shadow;
        let emissive = emissiveColor * emissiveIntensity;
        let color    = BASE_COLOR * lighting + emissive;
        return FragmentOutput(
          vec4f(color, 1.0),
          vec4f(emissive, 1.0),
          vec4f(frag.worldNormal * 0.5 + 0.5, 1.0),
          vec4f(BASE_COLOR, 0.0)
        );
      }
    `;

    // ── Smooth value noise (2-D, 4 octaves) ───────────────────────────────────
    function hash2(xi, yi) {
      const n = Math.sin(xi * 127.1 + yi * 311.7) * 43758.5453;
      return n - Math.floor(n);
    }

    function valueNoise(x, y) {
      const ix = Math.floor(x), iy = Math.floor(y);
      const fx = x - ix,       fy = y - iy;
      const ux = fx * fx * (3 - 2 * fx); // smoothstep
      const uy = fy * fy * (3 - 2 * fy);
      const a = hash2(ix,   iy  ), b = hash2(ix+1, iy  );
      const c = hash2(ix,   iy+1), d = hash2(ix+1, iy+1);
      return a + (b-a)*ux + (c-a)*uy + ((d-c)-(b-a))*ux*uy;
    }

    function fbm(x, y, octaves = 4) {
      let v = 0, amp = 0.5, freq = 1, norm = 0;
      for (let i = 0; i < octaves; i++) {
        v    += valueNoise(x * freq, y * freq) * amp;
        norm += amp;
        amp  *= 0.5;
        freq *= 2.0;
      }
      return v / norm; // normalised [0, 1]
    }

    // ── Renderer ──────────────────────────────────────────────────────────────
    const renderer = new Renderer({
      width: window.innerWidth,
      height: window.innerHeight,
      devicePixelRatio: 2,
      antialias: true,
      sampleCount: 1
    });
    await renderer.initialize();
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.canvas);
    renderer.canvas.style.width = '100%';
    renderer.canvas.style.height = '100%';

    // ── Shadow receiving on geometry ─────────────────────────────────────
    renderer.shadowsEnabled = true;

    // ── Volumetric fog resources ──────────────────────────────────────────
    const shadowMap = new ShadowMap(renderer.gpuDevice, { resolution: 2048 });
    renderer.shadowMap = shadowMap;
    const froxelGrid = new FroxelGrid(renderer.gpuDevice, {
      gridW: 160, gridH: 90, gridD: 128,
      near: 0.5, far: 300,
      temporal: true,
      blendFactor: 0.05,
    });

    const cubeMapShadowMap = new CubeMapShadowMap(renderer.gpuDevice, { resolution: 512 });

    // ── Camera & controls ─────────────────────────────────────────────────────
    const scene  = new Scene();
    const camera = new Camera(70, 0.1, 500, window.innerWidth / window.innerHeight);

    // Add directional light to scene
    scene.add(dirLight);
    const orbitRadius = window.innerWidth < 768 ? 120 : 90;
    const cameraControls = new CameraControls(camera, new Vector3(0, 30, 0), null, orbitRadius);

    // ── Materials ─────────────────────────────────────────────────────────────
    const material = new Material(lambertShader, {
      bindings: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, value: lightDirUniform },
      ],
    });

    const emissiveMaterial = new Material(emissiveLambertShader, {
      outputsEmissive: true,
      bindings: [
        { binding: 0, visibility: GPUShaderStage.FRAGMENT, value: lightDirUniform },
        { binding: 1, visibility: GPUShaderStage.FRAGMENT, value: emissiveColor },
        { binding: 2, visibility: GPUShaderStage.FRAGMENT, value: emissiveIntensity },
      ],
    });
    const geometry = new BoxGeometry(1, 1, 1);

    // ── Grid of cubes ─────────────────────────────────────────────────────────
    const half     = (GRID_SIZE - 1) * GRID_SPACING * 0.5; // centre grid at 0,0
    const gridSpan = GRID_SIZE * GRID_SPACING;              // total Z extent

    // Each cube keeps its original grid Z so the noise coordinate is
    // (worldX, originalZ - noiseOffset), i.e. we slide a window through the
    // noise field continuously.  When a cube wraps, originalZ shifts by
    // -gridSpan so the next sample is seamless.
    const cubes = [];

    for (let row = 0; row < GRID_SIZE; row++) {
      for (let col = 0; col < GRID_SIZE; col++) {
        const worldX = col * GRID_SPACING - half;
        const worldZ = row * GRID_SPACING - half;

        const renderable = new Renderable(geometry, material);
        renderable.position.x = worldX;
        renderable.position.y = 0;
        renderable.position.z = worldZ;

        const noiseVal = fbm(worldX * NOISE_ZOOM, worldZ * NOISE_ZOOM);
        renderable.scale.y = noiseVal * SCALE_Y_STRENGTH + 0.1;

        scene.add(renderable);
        cubes.push({ obj: renderable, noiseZ: worldZ });
      }
    }

    let noiseOffset = 0;

    // ── Floating spheres above the grid ──────────────────────────────────────
    const sphereGeometry = new SphereGeometry(2, 32, 32);
    const SPHERE_COUNT = 40;
    const SPHERE_SPREAD = half * 0.8; // keep within grid bounds
    const spheres = [];

    // Randomly pick 5-7 sphere indices to receive the emissive material.
    const EMISSIVE_COUNT = 5 + Math.floor(Math.random() * 3); // 5, 6, or 7
    const emissiveIndices = new Set();
    while (emissiveIndices.size < EMISSIVE_COUNT) {
      emissiveIndices.add(Math.floor(Math.random() * SPHERE_COUNT));
    }

    for (let i = 0; i < SPHERE_COUNT; i++) {
      const mat = emissiveIndices.has(i) ? emissiveMaterial : material;
      const sphere = new Renderable(sphereGeometry, mat);
      sphere.position.x = (Math.random() - 0.5) * 2 * SPHERE_SPREAD;
      sphere.position.y = 20 + Math.random() * 40; // float above columns
      sphere.position.z = (Math.random() - 0.5) * 2 * SPHERE_SPREAD;
      const s = 1 + Math.random() * 2;
      sphere.scale.x = s;
      sphere.scale.y = s;
      sphere.scale.z = s;
      scene.add(sphere);
      spheres.push(sphere);
    }

    // ── Refractive glass sphere ──────────────────────────────────────────────
    const glassSphere = new Renderable(sphereGeometry, material);
    glassSphere.position.set(0, 30, 0);
    glassSphere.scale.set(5, 5, 5);
    glassSphere.pathTracerMaterial = new PathTracerMaterial();
    glassSphere.pathTracerMaterial.refractive = true;
    glassSphere.pathTracerMaterial.ior = 1.5;
    glassSphere.pathTracerMaterial.maxBounces = 4;
    glassSphere.pathTracerMaterial.absorptionColor = [0.8, 0.95, 1.0];
    glassSphere.pathTracerMaterial.absorptionDensity = 0.5;
    scene.add(glassSphere);

    // ── Point lights ──────────────────────────────────────────────────────────
    const ptLight1 = new PointLight(30, [1.0, 0.4, 0.1], 5.0);
    ptLight1.position.set(10, 15, 0);
    ptLight1.volumetric = false;
    scene.add(ptLight1);

    const ptLight2 = new PointLight(25, [0.1, 0.4, 1.0], 4.0);
    ptLight2.position.set(-15, 20, 10);
    ptLight2.volumetric = false;
    scene.add(ptLight2);

    // ── Post-processing effects ────────────────────────────────────────────────
    const fogEffect = new VolumetricFogEffect({
      froxelGrid,
      shadowMap,
      cubeMapShadowMap,
      baseDensity: 0.035,
      heightFalloff: 0.01,
      anisotropy: 0.7,
    });

    const bloomEffect = new BloomEffect({
      threshold: 0.0,
      knee: 0.1,
      intensity: 0.8,
      radius: 1.0,
    });

    const dofEffect = new DepthOfFieldEffect({
      focusDistance: 35,
      focusRange: 30,
      maxBlur: 24,
    });

    const colorGradingEffect = new ColorGradingEffect();

    const pathTracerEffect = new PathTracerEffect({
      scene,
      temporalBlend: 0.1,
      spatialPasses: 3,
    });

    const allEffects = [pathTracerEffect, fogEffect, bloomEffect, dofEffect, colorGradingEffect];
    const volume = new PostProcessingVolume(renderer, [...allEffects]);

    // ── Effect toggles ──────────────────────────────────────────────────────────
    const effectToggles = {
      pathTracer: false,
      fog: false,
      bloom: false,
      dof: false,
      colorGrading: false,
    };

    function rebuildEffectChain() {
      volume.effects = [];
      if (effectToggles.pathTracer)   volume.effects.push(pathTracerEffect);
      if (effectToggles.fog)          volume.effects.push(fogEffect);
      if (effectToggles.bloom)        volume.effects.push(bloomEffect);
      if (effectToggles.dof)          volume.effects.push(dofEffect);
      if (effectToggles.colorGrading) volume.effects.push(colorGradingEffect);
    }
    rebuildEffectChain();

    // ── Tweakpane ───────────────────────────────────────────────────────────────
    const params = {
      scrollSpeed: SCROLL_SPEED,
      lightX: dirLight.direction[0],
      lightY: dirLight.direction[1],
      lightZ: dirLight.direction[2],
    };

    function syncLightDir() {
      dirLight.direction[0] = params.lightX;
      dirLight.direction[1] = params.lightY;
      dirLight.direction[2] = params.lightZ;
      lightDirUniform.x = params.lightX;
      lightDirUniform.y = params.lightY;
      lightDirUniform.z = params.lightZ;
      lightDirUniform.needsUpdate = true;
    }

    const pane = new Pane({ title: 'Controls' });

    const ptFolder = pane.addFolder({ title: 'Path Tracer' });
    ptFolder.addBinding(effectToggles, 'pathTracer', { label: 'enabled' }).on('change', rebuildEffectChain);
    ptFolder.addBinding(pathTracerEffect, 'temporalBlend', { min: 0.01, max: 1.0, step: 0.01 });
    ptFolder.addBinding(pathTracerEffect, 'spatialPasses', { min: 0, max: 5, step: 1 });

    const fogFolder = pane.addFolder({ title: 'Volumetric Fog' });
    fogFolder.addBinding(effectToggles, 'fog', { label: 'enabled' }).on('change', rebuildEffectChain);
    fogFolder.addBinding(fogEffect, 'baseDensity',    { min: 0, max: 0.2, step: 0.001 });
    fogFolder.addBinding(fogEffect, 'heightFalloff',  { min: 0, max: 0.5, step: 0.001 });
    fogFolder.addBinding(fogEffect, 'extinctionCoeff', { min: 0, max: 5, step: 0.01, label: 'extinction' });
    fogFolder.addBinding(fogEffect, 'anisotropy',     { min: -1, max: 1, step: 0.01 });
    fogFolder.addBinding(params, 'lightX', { min: -1, max: 1, step: 0.01, label: 'light X' }).on('change', syncLightDir);
    fogFolder.addBinding(params, 'lightY', { min: -1, max: 1, step: 0.01, label: 'light Y' }).on('change', syncLightDir);
    fogFolder.addBinding(params, 'lightZ', { min: -1, max: 1, step: 0.01, label: 'light Z' }).on('change', syncLightDir);

    const bloomFolder = pane.addFolder({ title: 'Bloom' });
    bloomFolder.addBinding(effectToggles, 'bloom', { label: 'enabled' }).on('change', rebuildEffectChain);
    bloomFolder.addBinding(bloomEffect, 'useEmissive', { label: 'emissive only' });
    bloomFolder.addBinding(bloomEffect, 'threshold',  { min: 0, max: 3, step: 0.01 });
    bloomFolder.addBinding(bloomEffect, 'knee',       { min: 0, max: 1, step: 0.01 });
    bloomFolder.addBinding(bloomEffect, 'intensity',  { min: 0, max: 3, step: 0.01 });
    bloomFolder.addBinding(bloomEffect, 'radius',     { min: 0, max: 2, step: 0.01 });

    const dofFolder = pane.addFolder({ title: 'Depth of Field' });
    dofFolder.addBinding(effectToggles, 'dof', { label: 'enabled' }).on('change', rebuildEffectChain);
    dofFolder.addBinding(dofEffect, 'focusDistance', { min: 1, max: 200, step: 1 });
    dofFolder.addBinding(dofEffect, 'focusRange',    { min: 1, max: 100, step: 1 });
    dofFolder.addBinding(dofEffect, 'maxBlur',       { min: 0, max: 64, step: 1 });

    const gradeFolder = pane.addFolder({ title: 'Color Grading' });
    gradeFolder.addBinding(effectToggles, 'colorGrading', { label: 'enabled' }).on('change', rebuildEffectChain);
    gradeFolder.addBinding(colorGradingEffect, 'brightness',  { min: -1, max: 1, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'contrast',    { min: 0, max: 3, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'saturation',  { min: 0, max: 3, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'temperature', { min: -1, max: 1, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'tint',        { min: -1, max: 1, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'highlights',  { min: 0, max: 2, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'shadows',     { min: 0, max: 2, step: 0.01 });
    gradeFolder.addBinding(colorGradingEffect, 'blackPoint',  { min: 0, max: 0.5, step: 0.01 });

    const emissiveParams = {
      color: { r: emissiveColor.x, g: emissiveColor.y, b: emissiveColor.z },
      intensity: emissiveIntensity.value,
    };
    const matFolder = pane.addFolder({ title: 'Emissive Spheres' });
    matFolder.addBinding(emissiveParams, 'color', { color: { type: 'float' }, label: 'emissive' }).on('change', (ev) => {
      emissiveColor.x = ev.value.r;
      emissiveColor.y = ev.value.g;
      emissiveColor.z = ev.value.b;
      emissiveColor.needsUpdate = true;
    });
    matFolder.addBinding(emissiveParams, 'intensity', { min: 0, max: 5, step: 0.01, label: 'emissive str' }).on('change', (ev) => {
      emissiveIntensity.value = ev.value;
    });

    // ── Point light controls ──
    const ptLight1Params = {
      x: ptLight1.position.x, y: ptLight1.position.y, z: ptLight1.position.z,
      radius: ptLight1.radius, intensity: ptLight1.intensity, volumetric: ptLight1.volumetric,
      color: { r: ptLight1.color[0], g: ptLight1.color[1], b: ptLight1.color[2] },
    };
    const ptFolder1 = pane.addFolder({ title: 'Point Light 1' });
    ptFolder1.addBinding(ptLight1Params, 'volumetric').on('change', (ev) => { ptLight1.volumetric = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'x', { min: -80, max: 80, step: 0.5 }).on('change', (ev) => { ptLight1.position.x = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'y', { min: 0, max: 80, step: 0.5 }).on('change', (ev) => { ptLight1.position.y = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'z', { min: -80, max: 80, step: 0.5 }).on('change', (ev) => { ptLight1.position.z = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'radius', { min: 1, max: 100, step: 1 }).on('change', (ev) => { ptLight1.radius = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'intensity', { min: 0, max: 20, step: 0.1 }).on('change', (ev) => { ptLight1.intensity = ev.value; });
    ptFolder1.addBinding(ptLight1Params, 'color', { color: { type: 'float' } }).on('change', (ev) => {
      ptLight1.color[0] = ev.value.r; ptLight1.color[1] = ev.value.g; ptLight1.color[2] = ev.value.b;
    });

    const ptLight2Params = {
      x: ptLight2.position.x, y: ptLight2.position.y, z: ptLight2.position.z,
      radius: ptLight2.radius, intensity: ptLight2.intensity, volumetric: ptLight2.volumetric,
      color: { r: ptLight2.color[0], g: ptLight2.color[1], b: ptLight2.color[2] },
    };
    const ptFolder2 = pane.addFolder({ title: 'Point Light 2' });
    ptFolder2.addBinding(ptLight2Params, 'volumetric').on('change', (ev) => { ptLight2.volumetric = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'x', { min: -80, max: 80, step: 0.5 }).on('change', (ev) => { ptLight2.position.x = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'y', { min: 0, max: 80, step: 0.5 }).on('change', (ev) => { ptLight2.position.y = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'z', { min: -80, max: 80, step: 0.5 }).on('change', (ev) => { ptLight2.position.z = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'radius', { min: 1, max: 100, step: 1 }).on('change', (ev) => { ptLight2.radius = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'intensity', { min: 0, max: 20, step: 0.1 }).on('change', (ev) => { ptLight2.intensity = ev.value; });
    ptFolder2.addBinding(ptLight2Params, 'color', { color: { type: 'float' } }).on('change', (ev) => {
      ptLight2.color[0] = ev.value.r; ptLight2.color[1] = ev.value.g; ptLight2.color[2] = ev.value.b;
    });

    const sceneFolder = pane.addFolder({ title: 'Scene' });
    sceneFolder.addBinding(params, 'scrollSpeed', { min: 0, max: 50, step: 0.5, label: 'scroll speed' });
    sceneFolder.addBinding(renderer, 'shadowsEnabled', { label: 'geometry shadows' });

    // ── Render loop ───────────────────────────────────────────────────────────
    let lastTime = performance.now();
    const maxZ = half + GRID_SPACING;

    function animate(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      const dz = params.scrollSpeed * dt;
      noiseOffset += dz;

      for (let i = 0; i < spheres.length; i++) {
        const obj = spheres[i];
        obj.position.y = Math.sin(i + now * 0.0001) * 40 + 45;
        obj.position.z += dz;
        if (obj.position.z > maxZ) {
          obj.position.z -= gridSpan;
        }
      }

      for (let i = 0; i < cubes.length; i++) {
        const obj = cubes[i].obj;
        obj.position.z += dz;
        if (obj.position.z > maxZ) {
          obj.position.z -= gridSpan;
          const nz = cubes[i].noiseZ - noiseOffset;
        }
        
      }

      cameraControls.update();
      shadowMap.render(renderer, scene, camera, dirLight);
      // Only render cubemap shadows for volumetric point lights
      const volPtLights = scene.pointLights.filter(l => l.volumetric);
      if (volPtLights.length > 0) {
        cubeMapShadowMap.render(renderer, scene, camera, volPtLights);
      }
      fogEffect.updateLights(scene.directionalLights, scene.pointLights);
      volume.render(scene, camera);
      requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
  </script>
</body>
