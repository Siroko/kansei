<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kansei</title>
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background-color: black; }
      canvas { width: 100%; height: 100%; }
    </style>
  </head>
  <body>
    <script type="module">
      import { Renderer } from '../src/renderers/Renderer'
      import { Scene } from '../src/objects/Scene'
      import { Camera } from '../src/cameras/Camera'
      import { CameraControls } from '../src/controls/CameraControls'
      import { MouseVectors } from '../src/controls/MouseVectors'
      import { Vector3 } from '../src/math/Vector3'
      import { Vector4 } from '../src/math/Vector4'
      import { Matrix4 } from '../src/math/Matrix4'
      import { ComputeBuffer } from '../src/buffers/ComputeBuffer'
      import { BufferBase } from '../src/buffers/BufferBase'
      import { FluidSimulation } from '../src/simulations/fluid/FluidSimulation'
      import { FluidDensityField } from '../src/simulations/fluid/FluidDensityField'
      import { FluidMarchingCubes } from '../src/simulations/fluid/FluidMarchingCubes'
      import { FluidSurfaceEffect } from '../src/postprocessing/effects/FluidSurfaceEffect'
      import { FluidTransmissionEffect } from '../src/postprocessing/effects/FluidTransmissionEffect'
      import { DepthOfFieldEffect } from '../src/postprocessing/effects/DepthOfFieldEffect'
      import { PostProcessingVolume } from '../src/postprocessing/PostProcessingVolume'
      import { Material } from '../src/materials/Material'
      import { Renderable } from '../src/objects/Renderable'
      import { Geometry } from '../src/buffers/Geometry'
      import { GLTFLoader } from '../src/loaders/GLTFLoader'
      import { DirectionalLight } from '../src/lights/DirectionalLight'
      import { Float } from '../src/math/Float'
      import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4/dist/tweakpane.min.js'

      // ── Renderer ──────────────────────────────────────────
      const renderer = new Renderer({
        clearColor: new Vector4(0.02, 0.02, 0.04, 1),
        width: window.innerWidth,
        height: window.innerHeight,
        devicePixelRatio: 1,
        sampleCount: 4,
      });
      await renderer.initialize();
      document.body.appendChild(renderer.canvas);

      // ── Scene & Camera ────────────────────────────────────
      const scene = new Scene();
      const camera = new Camera(45, 0.1, 1000, window.innerWidth / window.innerHeight);
      camera.position.set(0, 3, 30);
      camera.lookAt(new Vector3(0, 3, 0));

      // Camera: orbit target, initial azimuth flipped 180° around Y.
      // Mobile gets 2x the orbit radius so the fluid fits comfortably on
      // narrow portrait viewports without having to pinch-zoom out.
      const isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
        || (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
      const cameraRadius = isMobile ? 60 : 30;
      const cameraControls = new CameraControls(camera, new Vector3(0, 3, 0), window, cameraRadius, { invertWheel: true });
      cameraControls.azimuth = Math.PI;
      const mouseVectors = new MouseVectors();

      // ── Directional Light ────────────────────────────────
      const sun = new DirectionalLight([0.3, -1.0, 0.5], [1, 1, 1], 2.0);
      scene.add(sun);

      // ── Particle positions: 75k particles in an ellipsoid centered on the bounds ──
      const particleCount = 75000;
      const center = [0, 11, 0]; // (min+max)/2 of bounds
      const half = [22, 17, 14];  // ~88% of bounds half-extent
      const positions = new Float32Array(particleCount * 4);
      for (let i = 0; i < particleCount; i++) {
        let ux, uy, uz;
        do {
          ux = Math.random() * 2 - 1;
          uy = Math.random() * 2 - 1;
          uz = Math.random() * 2 - 1;
        } while (ux * ux + uy * uy + uz * uz > 1);
        positions[i * 4]     = center[0] + ux * half[0];
        positions[i * 4 + 1] = center[1] + uy * half[1];
        positions[i * 4 + 2] = center[2] + uz * half[2];
        positions[i * 4 + 3] = 1;
      }

      const positionsBuffer = new ComputeBuffer({
        type: BufferBase.BUFFER_TYPE_STORAGE,
        usage: BufferBase.BUFFER_USAGE_STORAGE | BufferBase.BUFFER_USAGE_VERTEX | BufferBase.BUFFER_USAGE_COPY_SRC,
        buffer: positions,
        shaderLocation: 3,
        offset: 0,
        stride: 4 * 4,
        format: 'float32x4',
      });

      // ── Fluid Simulation ──────────────────────────────────
      const simSettings = {
        maxParticles: particleCount,
        dimensions: 3,
        smoothingRadius: 1.0,
        pressureMultiplier: 46.5,
        nearPressureMultiplier: 20.0,
        densityTarget: 8.6,
        viscosity: 1.0,
        damping: 0.997,
        gravity: [0, -12.8, 0],
        gravityCenter: [0, 11, 0],
        radialGravity: false,
        returnToOriginStrength: 0.0,
        mouseRadius: 0.1,
        mouseForce: 2500.0,
        substeps: 2,
        worldBoundsPadding: 0.3,
      };

      const sim = new FluidSimulation(renderer, simSettings);
      const identityMatrix = new Matrix4();
      sim.initialize(positionsBuffer, positionsBuffer.clone(), {
        viewMatrix: camera.viewMatrix,
        projectionMatrix: camera.projectionMatrix,
        inverseViewMatrix: camera.inverseViewMatrix,
        worldMatrix: identityMatrix,
      });
      sim.worldBoundsMin = [-25, -8, -16];
      sim.worldBoundsMax = [25, 30, 16];
      sim.rebuildGrid();

      // ── Density field (constructed via Renderer, no GPUDevice in user code) ──
      let densityField = new FluidDensityField(renderer, sim, {
        resolution: 128,
        kernelScale: 0.6,
      });

      // ── Marching Cubes (runs compute → standard Renderable via Geometry.fromGpuBuffers) ──
      const mc = new FluidMarchingCubes(renderer, {
        maxTriangles: 1_000_000,
        isoLevel: 0.37,
        useClassic: true,
      });
      const mcExtractBG = mc.createBindGroup(densityField);
      const mcGeometry = Geometry.fromGpuBuffers(
        mc.vertexBuffer,
        mc.indexBuffer,
        mc.indirectArgsBuffer,
        'uint32',
      );

      // Fluid mesh material: writes base colour + world-space normal to the GBuffer.
      // It is marked `transmissive: true` so the renderer splits the GBuffer pass,
      // snapshots the opaque-only colour into GBuffer.backgroundTexture, and then
      // draws the mesh — so FluidTransmissionEffect can refract the background.
      const fluidMeshShader = /* wgsl */`
@group(0) @binding(0) var<uniform> fluidColor: vec4<f32>;
@group(1) @binding(0) var<uniform> normalMatrix: mat4x4<f32>;
@group(1) @binding(1) var<uniform> worldMatrix: mat4x4<f32>;
@group(2) @binding(0) var<uniform> viewMatrix: mat4x4<f32>;
@group(2) @binding(1) var<uniform> projectionMatrix: mat4x4<f32>;

struct VOut {
    @builtin(position) pos: vec4<f32>,
    @location(0) worldNormal: vec3<f32>,
};
struct FragOut {
    @location(0) color: vec4<f32>,
    @location(1) emissive: vec4<f32>,
    @location(2) normal: vec4<f32>,
    @location(3) albedo: vec4<f32>,
};

@vertex
fn vertex_main(
    @location(0) position: vec4<f32>,
    @location(1) normal: vec3<f32>,
    @location(2) uv: vec2<f32>,
) -> VOut {
    let wp = (worldMatrix * vec4<f32>(position.xyz, 1.0)).xyz;
    let wn = normalize((normalMatrix * vec4<f32>(normal, 0.0)).xyz);
    var out: VOut;
    out.pos = projectionMatrix * viewMatrix * vec4<f32>(wp, 1.0);
    out.worldNormal = wn;
    return out;
}

@fragment
fn fragment_main(v: VOut) -> FragOut {
    let n = normalize(v.worldNormal);
    // Simple lit base (the transmission effect later overwrites this with a
    // proper refraction composite wherever the normal is non-zero).
    let light = normalize(vec3<f32>(0.3, 1.0, 0.5));
    let ndotl = max(dot(n, light), 0.0);
    let lit = fluidColor.rgb * (0.2 + ndotl * 0.8);
    var out: FragOut;
    out.color = vec4<f32>(lit, 1.0);
    out.emissive = vec4<f32>(0.0);
    out.normal = vec4<f32>(n, 1.0);
    out.albedo = vec4<f32>(fluidColor.rgb, 1.0);
    return out;
}
`;
      const fluidColorU = new Vector4(0.77, 0.96, 1.0, 1.0);
      const fluidMeshMat = new Material(fluidMeshShader, {
        bindings: [
          { binding: 0, visibility: GPUShaderStage.FRAGMENT, value: fluidColorU },
        ],
        cullMode: 'none',
        transmissive: true,
      });
      const fluidMesh = new Renderable(mcGeometry, fluidMeshMat);
      scene.add(fluidMesh);

      // ── Post-processing chain ──
      // Mesh mode:     [FluidTransmissionEffect, DepthOfFieldEffect]
      // Raymarch mode: [FluidSurfaceEffect,      DepthOfFieldEffect]
      const transmissionEffect = new FluidTransmissionEffect({
        color: [0.77, 0.96, 1.0],
        ior: 1.41,
        chromaticAberration: 0.05,
        tintStrength: 0.30,
        fresnelPower: 2.3,
        roughness: 0.28,
        thickness: 2.4,
      });
      const surfaceEffect = new FluidSurfaceEffect({
        densityField,
        fluidColor: [0.77, 0.96, 1.0],
        densityScale: 1.1,
        densityThreshold: 1.09,
        absorption: 2.5,
        stepCount: 128,
      });
      const dofEffect = new DepthOfFieldEffect({
        focusDistance: 42,
        focusRange: 37,
        maxBlur: 7,
      });
      const volume = new PostProcessingVolume(renderer, [transmissionEffect, dofEffect]);

      // ── Render mode switcher ──
      // 'mesh'      — GPU-built marching cubes mesh rendered as a standard Renderable
      // 'raymarch'  — density field raymarched in a post-processing effect
      const renderMode = { mode: 'mesh' };

      // ── Dome (loaded from GLB, with op-art stripe shader) ──
      // Three Vector4 uniforms (engine-managed): colorA, colorB, thickness (xy + 2 pad)
      const stripeShader = /* wgsl */`
@group(0) @binding(0) var<uniform> colorA: vec4<f32>;
@group(0) @binding(1) var<uniform> colorB: vec4<f32>;
@group(0) @binding(2) var<uniform> thickness: vec4<f32>; // x = thicknessA, y = thicknessB
@group(1) @binding(0) var<uniform> normalMatrix: mat4x4<f32>;
@group(1) @binding(1) var<uniform> worldMatrix: mat4x4<f32>;
@group(2) @binding(0) var<uniform> viewMatrix: mat4x4<f32>;
@group(2) @binding(1) var<uniform> projectionMatrix: mat4x4<f32>;

struct VOut {
    @builtin(position) pos: vec4<f32>,
    @location(0) worldPos: vec3<f32>,
    @location(1) worldNormal: vec3<f32>,
};
struct FragOut {
    @location(0) color: vec4<f32>,
    @location(1) emissive: vec4<f32>,
    @location(2) normal: vec4<f32>,
    @location(3) albedo: vec4<f32>,
};

@vertex
fn vertex_main(
    @location(0) position: vec4<f32>,
    @location(1) normal: vec3<f32>,
    @location(2) uv: vec2<f32>,
) -> VOut {
    let wp = (worldMatrix * vec4<f32>(position.xyz, 1.0)).xyz;
    let wn = normalize((normalMatrix * vec4<f32>(normal, 0.0)).xyz);
    var out: VOut;
    out.pos = projectionMatrix * viewMatrix * vec4<f32>(wp, 1.0);
    out.worldPos = wp;
    out.worldNormal = wn;
    return out;
}

@fragment
fn fragment_main(v: VOut) -> FragOut {
    let period = thickness.x + thickness.y;
    let t = ((v.worldPos.x % period) + period) % period;
    let inA = t < thickness.x;
    let base = select(colorB.rgb, colorA.rgb, inA);
    let n = normalize(v.worldNormal);
    let lightDir = normalize(vec3<f32>(0.3, 1.0, 0.5));
    let ndotl = max(dot(n, lightDir), 0.0);
    let lit = base * (0.3 + ndotl * 0.7);
    var out: FragOut;
    out.color = vec4<f32>(lit, 1.0);
    out.emissive = vec4<f32>(0.0);
    // normal.w = 0 → dome is NOT transmissive (FluidTransmissionEffect ignores it)
    out.normal = vec4<f32>(n, 0.0);
    out.albedo = vec4<f32>(base, 1.0);
    return out;
}
`;
      const stripeColorA = new Vector4(0, 0, 0, 1);
      const stripeColorB = new Vector4(1, 1, 1, 1);
      const stripeThickness = new Vector4(8.9, 9.6, 0, 0);
      const stripeMat = new Material(stripeShader, {
        bindings: [
          { binding: 0, visibility: GPUShaderStage.FRAGMENT, value: stripeColorA },
          { binding: 1, visibility: GPUShaderStage.FRAGMENT, value: stripeColorB },
          { binding: 2, visibility: GPUShaderStage.FRAGMENT, value: stripeThickness },
        ],
        cullMode: 'front', // see-through from outside
      });

      const gltfLoader = new GLTFLoader();
      try {
        const gltf = await gltfLoader.load('./assets/dome.glb', stripeMat);
        // Scale up the dome so it encloses the sim volume
        gltf.scene.scale.set(20, 20, 20);
        gltf.scene.position.set(0, 3, 0);
        scene.add(gltf.scene);
      } catch (e) {
        console.warn('Could not load dome.glb', e);
      }

      // ── Tweakpane ─────────────────────────────────────────
      const pane = new Pane({ title: 'Fluid 3D', expanded: false });

      // ── Effect chain builder ──
      // Rebuilds volume.effects from the current mode + DoF toggle. Effects that
      // are disabled are completely removed from the chain, so the renderer
      // doesn't dispatch their compute passes at all (no ping-pong, no work).
      const dofOpts = { enabled: true };
      const rebuildEffectChain = () => {
        const base = renderMode.mode === 'raymarch' ? surfaceEffect : transmissionEffect;
        volume.effects = dofOpts.enabled ? [base, dofEffect] : [base];
      };

      // ── Render Mode ──
      const modeFolder = pane.addFolder({ title: 'Render Mode', expanded: false });
      modeFolder.addBinding(renderMode, 'mode', {
        options: { Mesh: 'mesh', Raymarch: 'raymarch' },
      }).on('change', (ev) => {
        if (ev.value === 'raymarch') mc.clear(); // hide the MC mesh until we flip back
        rebuildEffectChain();
      });
      const mcOpts = { classic: true, iso: 0.37 };
      modeFolder.addBinding(mcOpts, 'classic', { label: 'MC classic' }).on('change', () => {
        mc.useClassic = mcOpts.classic;
      });
      modeFolder.addBinding(mcOpts, 'iso', { min: 0.001, max: 1.0, step: 0.001, label: 'MC iso' }).on('change', () => {
        mc.isoLevel = mcOpts.iso;
      });

      // ── Sim Timing ─────────────────────────────────────────
      // True framerate-independent simulation via a fixed-step accumulator.
      //
      //   simStepDt    — real-world duration of a single sim step. The sim
      //                  is integrated in chunks of this size regardless of
      //                  the current render framerate, so behaviour is
      //                  deterministic at 30, 33, 60, 90, 144 fps.
      //   simTimeScale — speed multiplier applied to the sim dt (user facing).
      //                  Changes how fast the sim advances vs. wall clock
      //                  without changing the number of steps per second.
      //   maxSimSteps  — upper bound on how many sim steps we're allowed to
      //                  run per rendered frame. Prevents the classic
      //                  "spiral of death" where a slow frame triggers more
      //                  catch-up work which makes the next frame even slower.
      //                  Extra accumulated time is simply discarded.
      const timing = { simStepDt: 1 / 60, simTimeScale: 1.9, maxSimSteps: 4 };
      const timingFolder = pane.addFolder({ title: 'Sim Timing', expanded: false });
      timingFolder.addBinding(timing, 'simStepDt',    { min: 1 / 240, max: 1 / 30, step: 1 / 240, label: 'sim dt step' });
      timingFolder.addBinding(timing, 'simTimeScale', { min: 0.1, max: 4.0, step: 0.05, label: 'sim scale' });
      timingFolder.addBinding(timing, 'maxSimSteps',  { min: 1, max: 8, step: 1, label: 'max steps/frame' });

      // ── SPH ──
      const sphFolder = pane.addFolder({ title: 'SPH', expanded: false });
      sphFolder.addBinding(simSettings, 'pressureMultiplier', { min: 0, max: 100, step: 0.5, label: 'pressure' }).on('change', () => { sim.params.pressureMultiplier = simSettings.pressureMultiplier; });
      sphFolder.addBinding(simSettings, 'nearPressureMultiplier', { min: 0, max: 100, step: 0.5, label: 'near pressure' }).on('change', () => { sim.params.nearPressureMultiplier = simSettings.nearPressureMultiplier; });
      sphFolder.addBinding(simSettings, 'densityTarget', { min: 0, max: 20, step: 0.1, label: 'density target' }).on('change', () => { sim.params.densityTarget = simSettings.densityTarget; });
      sphFolder.addBinding(simSettings, 'viscosity', { min: 0, max: 1, step: 0.01 }).on('change', () => { sim.params.viscosity = simSettings.viscosity; });
      sphFolder.addBinding(simSettings, 'damping', { min: 0.9, max: 1.0, step: 0.001 }).on('change', () => { sim.params.damping = simSettings.damping; });

      // ── Forces ──
      const forcesFolder = pane.addFolder({ title: 'Forces', expanded: false });
      const gravityObj = { y: simSettings.gravity[1] };
      forcesFolder.addBinding(gravityObj, 'y', { min: -20, max: 0, step: 0.1, label: 'gravity Y' }).on('change', () => { sim.params.gravity = [0, gravityObj.y, 0]; });
      forcesFolder.addBinding(simSettings, 'mouseForce', { min: 0, max: 5000, step: 10, label: 'mouse force' }).on('change', () => { sim.params.mouseForce = simSettings.mouseForce; });
      forcesFolder.addBinding(simSettings, 'mouseRadius', { min: 0.01, max: 2, step: 0.01, label: 'mouse radius' }).on('change', () => { sim.params.mouseRadius = simSettings.mouseRadius; });
      forcesFolder.addBinding(simSettings, 'substeps', { min: 1, max: 8, step: 1 }).on('change', () => { sim.params.substeps = simSettings.substeps; });

      // ── Radial Gravity (Planet) ──
      const planetFolder = pane.addFolder({ title: 'Radial Gravity (Planet)', expanded: false });
      const pl = { enabled: false, cx: 0, cy: 11, cz: 0 };
      const syncPlanet = () => {
        sim.params.gravityCenter = [pl.cx, pl.cy, pl.cz];
      };
      planetFolder.addBinding(pl, 'enabled', { label: 'radial' }).on('change', () => { sim.params.radialGravity = pl.enabled; });
      planetFolder.addBinding(pl, 'cx', { min: -30, max: 30, step: 0.5, label: 'center X' }).on('change', syncPlanet);
      planetFolder.addBinding(pl, 'cy', { min: -10, max: 30, step: 0.5, label: 'center Y' }).on('change', syncPlanet);
      planetFolder.addBinding(pl, 'cz', { min: -20, max: 20, step: 0.5, label: 'center Z' }).on('change', syncPlanet);

      // ── Light ──
      const lightFolder = pane.addFolder({ title: 'Light', expanded: false });
      const lt = { dirX: 0.3, dirY: -1.0, dirZ: 0.5, intensity: 2.0, r: 1, g: 1, b: 1 };
      const syncLightDir = () => {
        const len = Math.hypot(lt.dirX, lt.dirY, lt.dirZ) || 1;
        sun.direction[0] = lt.dirX / len;
        sun.direction[1] = lt.dirY / len;
        sun.direction[2] = lt.dirZ / len;
      };
      lightFolder.addBinding(lt, 'dirX', { min: -1, max: 1, step: 0.01, label: 'dir X' }).on('change', syncLightDir);
      lightFolder.addBinding(lt, 'dirY', { min: -1, max: 1, step: 0.01, label: 'dir Y' }).on('change', syncLightDir);
      lightFolder.addBinding(lt, 'dirZ', { min: -1, max: 1, step: 0.01, label: 'dir Z' }).on('change', syncLightDir);
      lightFolder.addBinding(lt, 'intensity', { min: 0, max: 10, step: 0.1 }).on('change', () => { sun.intensity = lt.intensity; });
      lightFolder.addBinding(lt, 'r', { min: 0, max: 1, step: 0.01, label: 'color R' }).on('change', () => { sun.color[0] = lt.r; });
      lightFolder.addBinding(lt, 'g', { min: 0, max: 1, step: 0.01, label: 'color G' }).on('change', () => { sun.color[1] = lt.g; });
      lightFolder.addBinding(lt, 'b', { min: 0, max: 1, step: 0.01, label: 'color B' }).on('change', () => { sun.color[2] = lt.b; });

      // ── Transmission (mesh mode) ──
      const txFolder = pane.addFolder({ title: 'Transmission', expanded: false });
      const tx = {
        ior: 1.41,
        chromaticAberration: 0.05,
        tintStrength: 0.30,
        fresnelPower: 2.3,
        roughness: 0.28,
        thickness: 2.4,
        color: { r: 0.77, g: 0.96, b: 1.0 },
      };
      const syncTx = () => {
        transmissionEffect.ior = tx.ior;
        transmissionEffect.chromaticAberration = tx.chromaticAberration;
        transmissionEffect.tintStrength = tx.tintStrength;
        transmissionEffect.fresnelPower = tx.fresnelPower;
        transmissionEffect.roughness = tx.roughness;
        transmissionEffect.thickness = tx.thickness;
        transmissionEffect.color = [tx.color.r, tx.color.g, tx.color.b];
        fluidColorU.x = tx.color.r;
        fluidColorU.y = tx.color.g;
        fluidColorU.z = tx.color.b;
      };
      txFolder.addBinding(tx, 'ior', { min: 1.0, max: 2.5, step: 0.01 }).on('change', syncTx);
      txFolder.addBinding(tx, 'chromaticAberration', { min: 0, max: 1.0, step: 0.01, label: 'chromatic' }).on('change', syncTx);
      txFolder.addBinding(tx, 'tintStrength', { min: 0, max: 1, step: 0.01, label: 'tint' }).on('change', syncTx);
      txFolder.addBinding(tx, 'fresnelPower', { min: 1, max: 10, step: 0.1, label: 'fresnel' }).on('change', syncTx);
      txFolder.addBinding(tx, 'roughness', { min: 0, max: 1, step: 0.01 }).on('change', syncTx);
      txFolder.addBinding(tx, 'thickness', { min: 0, max: 5, step: 0.1 }).on('change', syncTx);
      txFolder.addBinding(tx, 'color', { color: { type: 'float' }, label: 'fluid color' }).on('change', syncTx);

      // ── Surface (raymarch mode) ──
      const surfaceFolder = pane.addFolder({ title: 'Surface (Raymarch)', expanded: false });
      const colorObj = { r: 0.77, g: 0.96, b: 1.0 };
      const syncColor = () => { surfaceEffect.fluidColor = [colorObj.r, colorObj.g, colorObj.b]; };
      surfaceFolder.addBinding(colorObj, 'r', { min: 0, max: 1, step: 0.01, label: 'color R' }).on('change', syncColor);
      surfaceFolder.addBinding(colorObj, 'g', { min: 0, max: 1, step: 0.01, label: 'color G' }).on('change', syncColor);
      surfaceFolder.addBinding(colorObj, 'b', { min: 0, max: 1, step: 0.01, label: 'color B' }).on('change', syncColor);
      surfaceFolder.addBinding(surfaceEffect, 'densityScale', { min: 0.1, max: 10.0, step: 0.1, label: 'density scale' });
      surfaceFolder.addBinding(surfaceEffect, 'densityThreshold', { min: 0.01, max: 5.0, step: 0.01, label: 'threshold' });
      surfaceFolder.addBinding(surfaceEffect, 'absorption', { min: 0.0, max: 10.0, step: 0.1 });
      surfaceFolder.addBinding(surfaceEffect, 'stepCount', { min: 16, max: 128, step: 1, label: 'steps' });

      // ── Depth of Field ──
      const dofFolder = pane.addFolder({ title: 'Depth of Field', expanded: false });
      dofFolder.addBinding(dofOpts, 'enabled', { label: 'enabled' }).on('change', rebuildEffectChain);
      dofFolder.addBinding(dofEffect, 'focusDistance', { min: 1, max: 200, step: 1, label: 'focus dist' });
      dofFolder.addBinding(dofEffect, 'focusRange', { min: 1, max: 100, step: 1, label: 'focus range' });
      dofFolder.addBinding(dofEffect, 'maxBlur', { min: 0, max: 64, step: 1, label: 'max blur' });

      // ── Dome Stripes ──
      const stripeFolder = pane.addFolder({ title: 'Dome Stripes', expanded: false });
      const sp = {
        colorA: { r: 0, g: 0, b: 0 },
        colorB: { r: 1, g: 1, b: 1 },
        thicknessA: 8.9,
        thicknessB: 9.6,
      };
      stripeFolder.addBinding(sp, 'colorA', { color: { type: 'float' }, label: 'color A' }).on('change', () => {
        stripeColorA.x = sp.colorA.r; stripeColorA.y = sp.colorA.g; stripeColorA.z = sp.colorA.b;
      });
      stripeFolder.addBinding(sp, 'colorB', { color: { type: 'float' }, label: 'color B' }).on('change', () => {
        stripeColorB.x = sp.colorB.r; stripeColorB.y = sp.colorB.g; stripeColorB.z = sp.colorB.b;
      });
      stripeFolder.addBinding(sp, 'thicknessA', { min: 0.1, max: 20, step: 0.1, label: 'thickness A' }).on('change', () => {
        stripeThickness.x = sp.thicknessA;
      });
      stripeFolder.addBinding(sp, 'thicknessB', { min: 0.1, max: 20, step: 0.1, label: 'thickness B' }).on('change', () => {
        stripeThickness.y = sp.thicknessB;
      });

      // ── Bounds ──
      const boundsFolder = pane.addFolder({ title: 'Bounds', expanded: false });
      const boundsObj = { minX: -25, minY: -8, minZ: -16, maxX: 25, maxY: 30, maxZ: 16 };
      const syncBounds = () => {
        sim.worldBoundsMin = [boundsObj.minX, boundsObj.minY, boundsObj.minZ];
        sim.worldBoundsMax = [boundsObj.maxX, boundsObj.maxY, boundsObj.maxZ];
        sim.rebuildGrid();
      };
      boundsFolder.addBinding(boundsObj, 'minX', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
      boundsFolder.addBinding(boundsObj, 'minY', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
      boundsFolder.addBinding(boundsObj, 'minZ', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
      boundsFolder.addBinding(boundsObj, 'maxX', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);
      boundsFolder.addBinding(boundsObj, 'maxY', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);
      boundsFolder.addBinding(boundsObj, 'maxZ', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);

      // ── Render loop ───────────────────────────────────────
      // Fixed-timestep simulation: drain an accumulator in chunks of exactly
      // `simStepDt`, calling `sim.updateBatched()` with the number of steps
      // to run in a single command encoder. This gives framerate-independent
      // behaviour — 30 / 33 / 60 / 90 / 144 fps all produce the same sim
      // evolution over the same wall-clock window.
      let lastPerf     = performance.now();
      let simAccumulator = 0;

      function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        // Raw frame delta. Clamped to avoid zero-division and to drop huge
        // pauses (hidden tab, devtools, GC stall) on the floor so we don't
        // try to catch up hundreds of steps.
        const frameDt = Math.min(Math.max((now - lastPerf) / 1000, 1 / 1000), 0.1);
        lastPerf = now;

        mouseVectors.update(frameDt);
        cameraControls.update(now / 1000);

        // Accumulate wall-clock, convert to sim-clock via simTimeScale.
        simAccumulator += frameDt * timing.simTimeScale;
        const stepDt = timing.simStepDt;
        let steps = 0;
        while (simAccumulator >= stepDt && steps < timing.maxSimSteps) {
          simAccumulator -= stepDt;
          steps++;
        }
        // If we still have a large leftover after maxSimSteps, the renderer
        // can't keep up — drop the excess so we don't spiral on the next frame.
        if (simAccumulator > stepDt) simAccumulator = stepDt;

        if (steps > 0) {
          sim.updateBatched(
            stepDt,
            steps,
            mouseVectors.mousePosition,
            mouseVectors.mouseDirection,
            mouseVectors.mouseStrength,
          );
        }

        // Density field update — engine handles its own encoder/submit.
        densityField.update();

        // Marching cubes: rebuild the mesh each frame from the density field.
        // Skipped in raymarch mode to save GPU time.
        if (renderMode.mode === 'mesh') {
          mc.update(mcExtractBG, densityField);
        }

        volume.render(scene, camera);
      }
      animate();

      // ── Resize ────────────────────────────────────────────
      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
      });
    </script>
  </body>
</html>
