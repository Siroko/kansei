<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Kansei</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <canvas id="kansei"></canvas>
    <script type="module">
        import init, { start, get_fps, get_frame_time,
            set_pressure, set_near_pressure, set_density_target,
            set_viscosity, set_damping, set_gravity_y, set_mouse_force, set_mouse_radius,
            set_radial_gravity, set_gravity_center,
            set_particle_size, set_substeps, set_show_particles, set_render_mode, set_mc_iso_level, set_mc_resolution,
            set_use_batched_sim,
            set_sim_dt_step, set_sim_time_scale, set_max_render_fps,
            set_density_scale, set_density_threshold, set_absorption, set_step_count,
            set_kernel_scale, set_density_resolution, set_bounds,
            set_stripe_params,
            set_light_direction, set_light_intensity, set_light_color,
            set_dof_focus_distance, set_dof_focus_range, set_dof_max_blur,
            set_transmission_params
        } from './pkg/kansei_wasm_fluid.js';
        import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4/dist/tweakpane.min.js';

        await init();
        await start('kansei');

        const pane = new Pane({ title: 'Fluid 3D (WASM)', expanded: false });
        const p = {
            showParticles: true, renderMode: 'MarchingCubes', mcIso: 0.37, mcResolution: 128, particleSize: 0.15, batchedSim: true,
            simPreset: 'Balanced',
            simStepDt: 1 / 60,
            simTimeScale: 1.9,
            renderFps: 0,
            pressure: 46.5, nearPressure: 20.0, densityTarget: 8.6,
            viscosity: 1.0, damping: 0.997, gravityY: -12.8,
            mouseForce: 5000, mouseRadius: 0.1, substeps: 2,
            densityScale: 1.1, threshold: 1.09, absorption: 2.5, steps: 128,
            resolution: 128, kernelScale: 0.6,
        };
        const simPresets = {
            'Balanced':   { step: 1 / 60, scale: 1.0 },
            'Fast 1.5x':  { step: 1 / 60, scale: 1.5 },
            'Slow 0.75x': { step: 1 / 60, scale: 0.75 },
            'Stable':     { step: 1 / 75, scale: 1.0 },
        };

        const debug = pane.addFolder({ title: 'Debug', expanded: false });
        debug.addBinding(p, 'showParticles', { label: 'show particles' }).on('change', () => set_show_particles(p.showParticles));
        debug.addBinding(p, 'renderMode', {
            label: 'render mode',
            options: [
                { text: 'Particles', value: 'Particles' },
                { text: 'Raymarch', value: 'Raymarch' },
                { text: 'Voxel Shell (grid)', value: 'VoxelShell' },
                { text: 'Marching Cubes', value: 'MarchingCubes' },
            ],
        }).on('change', () => {
            const modeMap = { Particles: 0, Raymarch: 1, VoxelShell: 2, MarchingCubes: 3 };
            set_render_mode(modeMap[p.renderMode] ?? 0);
        });
        debug.addBinding(p, 'particleSize', { min: 0.01, max: 0.5, step: 0.01 }).on('change', () => set_particle_size(p.particleSize));
        debug.addBinding(p, 'mcIso', { label: 'mc iso', min: 0.001, max: 1.0, step: 0.001 }).on('change', () => set_mc_iso_level(p.mcIso));
        debug.addBinding(p, 'mcResolution', { label: 'mc resolution', min: 0, max: 256, step: 8 }).on('change', () => set_mc_resolution(p.mcResolution));
        debug.addBinding(p, 'batchedSim', { label: 'batched sim' }).on('change', () => set_use_batched_sim(p.batchedSim));
        debug.addBinding(p, 'simPreset', {
            label: 'sim preset',
            options: Object.keys(simPresets).map((k) => ({ text: k, value: k })),
        }).on('change', () => {
            const pr = simPresets[p.simPreset];
            p.simStepDt = pr.step;
            p.simTimeScale = pr.scale;
            set_sim_dt_step(p.simStepDt);
            set_sim_time_scale(p.simTimeScale);
            pane.refresh();
        });
        debug.addBinding(p, 'simStepDt', { label: 'max step dt', min: 1 / 240, max: 1 / 20, step: 1 / 240 }).on('change', () => set_sim_dt_step(p.simStepDt));
        debug.addBinding(p, 'simTimeScale', { label: 'sim scale', min: 0.1, max: 4.0, step: 0.05 }).on('change', () => set_sim_time_scale(p.simTimeScale));
        debug.addBinding(p, 'renderFps', { label: 'render fps', options: [
            { text: '60', value: 60 },
            { text: '90', value: 90 },
            { text: '120', value: 120 },
            { text: 'Unlimited', value: 0 },
        ]}).on('change', () => set_max_render_fps(p.renderFps));

        const surface = pane.addFolder({ title: 'Surface', expanded: false });
        surface.addBinding(p, 'densityScale', { min: 0.1, max: 10, step: 0.1 }).on('change', () => set_density_scale(p.densityScale));
        surface.addBinding(p, 'threshold', { min: 0.01, max: 5, step: 0.01 }).on('change', () => set_density_threshold(p.threshold));
        surface.addBinding(p, 'absorption', { min: 0, max: 10, step: 0.1 }).on('change', () => set_absorption(p.absorption));
        surface.addBinding(p, 'steps', { min: 16, max: 128, step: 1 }).on('change', () => set_step_count(p.steps));

        const field = pane.addFolder({ title: 'Density Field', expanded: false });
        field.addBinding(p, 'resolution', { min: 16, max: 256, step: 16 }).on('change', () => set_density_resolution(p.resolution));
        field.addBinding(p, 'kernelScale', { min: 0.1, max: 10, step: 0.1 }).on('change', () => set_kernel_scale(p.kernelScale));

        const sph = pane.addFolder({ title: 'SPH', expanded: false });
        sph.addBinding(p, 'pressure', { min: 0, max: 100, step: 0.5 }).on('change', () => set_pressure(p.pressure));
        sph.addBinding(p, 'nearPressure', { min: 0, max: 100, step: 0.5 }).on('change', () => set_near_pressure(p.nearPressure));
        sph.addBinding(p, 'densityTarget', { min: 0, max: 20, step: 0.1 }).on('change', () => set_density_target(p.densityTarget));
        sph.addBinding(p, 'viscosity', { min: 0, max: 1, step: 0.01 }).on('change', () => set_viscosity(p.viscosity));
        sph.addBinding(p, 'damping', { min: 0.9, max: 1.0, step: 0.001 }).on('change', () => set_damping(p.damping));

        const forces = pane.addFolder({ title: 'Forces', expanded: false });
        forces.addBinding(p, 'gravityY', { min: -20, max: 0, step: 0.1 }).on('change', () => set_gravity_y(p.gravityY));
        forces.addBinding(p, 'mouseForce', { min: 0, max: 5000, step: 10 }).on('change', () => set_mouse_force(p.mouseForce));
        forces.addBinding(p, 'mouseRadius', { min: 0.01, max: 2, step: 0.01 }).on('change', () => set_mouse_radius(p.mouseRadius));
        forces.addBinding(p, 'substeps', { min: 1, max: 8, step: 1 }).on('change', () => set_substeps(p.substeps));

        const planet = pane.addFolder({ title: 'Radial Gravity (Planet)', expanded: false });
        const pl = { enabled: false, cx: 0.0, cy: 11.0, cz: 0.0 };
        const syncPlanet = () => set_gravity_center(pl.cx, pl.cy, pl.cz);
        planet.addBinding(pl, 'enabled', { label: 'radial' }).on('change', () => set_radial_gravity(pl.enabled));
        planet.addBinding(pl, 'cx', { min: -30, max: 30, step: 0.5, label: 'center X' }).on('change', syncPlanet);
        planet.addBinding(pl, 'cy', { min: -10, max: 30, step: 0.5, label: 'center Y' }).on('change', syncPlanet);
        planet.addBinding(pl, 'cz', { min: -20, max: 20, step: 0.5, label: 'center Z' }).on('change', syncPlanet);

        const bounds = pane.addFolder({ title: 'Bounds', expanded: false });
        const b = { minX: -25, minY: -8, minZ: -16, maxX: 25, maxY: 30, maxZ: 16 };
        const syncBounds = () => set_bounds(b.minX, b.minY, b.minZ, b.maxX, b.maxY, b.maxZ);
        bounds.addBinding(b, 'minX', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
        bounds.addBinding(b, 'minY', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
        bounds.addBinding(b, 'minZ', { min: -50, max: 0, step: 0.5 }).on('change', syncBounds);
        bounds.addBinding(b, 'maxX', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);
        bounds.addBinding(b, 'maxY', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);
        bounds.addBinding(b, 'maxZ', { min: 0, max: 50, step: 0.5 }).on('change', syncBounds);

        const lightFolder = pane.addFolder({ title: 'Light', expanded: false });
        const lt = {
            dirX: 0.3, dirY: -1.0, dirZ: 0.5,
            intensity: 2.0,
            color: { r: 1, g: 1, b: 1 },
        };
        const syncLightDir = () => set_light_direction(lt.dirX, lt.dirY, lt.dirZ);
        lightFolder.addBinding(lt, 'dirX', { min: -1, max: 1, step: 0.01, label: 'dir X' }).on('change', syncLightDir);
        lightFolder.addBinding(lt, 'dirY', { min: -1, max: 1, step: 0.01, label: 'dir Y' }).on('change', syncLightDir);
        lightFolder.addBinding(lt, 'dirZ', { min: -1, max: 1, step: 0.01, label: 'dir Z' }).on('change', syncLightDir);
        lightFolder.addBinding(lt, 'intensity', { min: 0, max: 10, step: 0.1 }).on('change', () => set_light_intensity(lt.intensity));
        lightFolder.addBinding(lt, 'color', { color: { type: 'float' } }).on('change', () => set_light_color(lt.color.r, lt.color.g, lt.color.b));

        const dofFolder = pane.addFolder({ title: 'Depth of Field', expanded: false });
        const dof = { focusDistance: 42, focusRange: 37, maxBlur: 7 };
        dofFolder.addBinding(dof, 'focusDistance', { min: 1, max: 200, step: 1, label: 'focus dist' })
            .on('change', () => set_dof_focus_distance(dof.focusDistance));
        dofFolder.addBinding(dof, 'focusRange', { min: 1, max: 100, step: 1, label: 'focus range' })
            .on('change', () => set_dof_focus_range(dof.focusRange));
        dofFolder.addBinding(dof, 'maxBlur', { min: 0, max: 64, step: 1, label: 'max blur' })
            .on('change', () => set_dof_max_blur(dof.maxBlur));

        const txFolder = pane.addFolder({ title: 'Transmission', expanded: false });
        const tx = {
            ior: 1.41, chromaticAberration: 0.05, tintStrength: 0.30,
            fresnelPower: 2.3, roughness: 0.28, thickness: 2.4,
            color: { r: 0.77, g: 0.96, b: 1.0 },
        };
        const syncTx = () => set_transmission_params(
            tx.ior, tx.chromaticAberration, tx.tintStrength,
            tx.fresnelPower, tx.roughness, tx.thickness,
            tx.color.r, tx.color.g, tx.color.b,
        );
        txFolder.addBinding(tx, 'ior', { min: 1.0, max: 2.5, step: 0.01 }).on('change', syncTx);
        txFolder.addBinding(tx, 'chromaticAberration', { min: 0, max: 1.0, step: 0.01, label: 'chromatic' }).on('change', syncTx);
        txFolder.addBinding(tx, 'tintStrength', { min: 0, max: 1, step: 0.01, label: 'tint' }).on('change', syncTx);
        txFolder.addBinding(tx, 'fresnelPower', { min: 1, max: 10, step: 0.1, label: 'fresnel' }).on('change', syncTx);
        txFolder.addBinding(tx, 'roughness', { min: 0, max: 1, step: 0.01 }).on('change', syncTx);
        txFolder.addBinding(tx, 'thickness', { min: 0, max: 5, step: 0.1 }).on('change', syncTx);
        txFolder.addBinding(tx, 'color', { color: { type: 'float' }, label: 'fluid color' }).on('change', syncTx);

        const stripe = pane.addFolder({ title: 'Dome Stripes', expanded: false });
        const sp = {
            colorA: { r: 0, g: 0, b: 0 },
            colorB: { r: 1, g: 1, b: 1 },
            thicknessA: 8.9,
            thicknessB: 9.6,
        };
        const syncStripes = () => set_stripe_params(
            sp.colorA.r, sp.colorA.g, sp.colorA.b,
            sp.colorB.r, sp.colorB.g, sp.colorB.b,
            sp.thicknessA, sp.thicknessB,
        );
        stripe.addBinding(sp, 'colorA', { color: { type: 'float' }, label: 'color A' }).on('change', syncStripes);
        stripe.addBinding(sp, 'colorB', { color: { type: 'float' }, label: 'color B' }).on('change', syncStripes);
        stripe.addBinding(sp, 'thicknessA', { min: 0.1, max: 10, step: 0.1, label: 'thickness A' }).on('change', syncStripes);
        stripe.addBinding(sp, 'thicknessB', { min: 0.1, max: 10, step: 0.1, label: 'thickness B' }).on('change', syncStripes);

        // Apply defaults to Rust side
        set_render_mode(3); // MarchingCubes
        set_mc_iso_level(p.mcIso);
        set_mc_resolution(p.mcResolution);
        set_sim_time_scale(p.simTimeScale);
        set_viscosity(p.viscosity);
        set_damping(p.damping);
        set_gravity_y(p.gravityY);
        set_mouse_force(p.mouseForce);
        set_substeps(p.substeps);
        set_kernel_scale(p.kernelScale);
        set_dof_focus_distance(dof.focusDistance);
        set_dof_focus_range(dof.focusRange);
        set_dof_max_blur(dof.maxBlur);
        syncTx();
        syncStripes();
    </script>
</body>
</html>
